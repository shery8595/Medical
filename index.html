<!doctype html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MedVault | Privacy-First Clinical Trials</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            background-color: #030712;
        }
    </style>
    <script>
        // --- EMERGENCY DIAGNOSTICS ---
        window.LOG_DEBUG = (msg, data) => {
            const timestamp = new Date().toISOString();
            console.log(`[MEDVAULT-DEBUG ${timestamp}] ${msg}`, data || '');
        };

        window.LOG_DEBUG('Diagnostic Script Started');

        // Finalize Globals
        window.global = window;
        window.process = {
            env: { NODE_ENV: 'production' },
            nextTick: (cb) => setTimeout(cb, 0),
            browser: true,
            cwd: () => '/'
        };

        // Critical Polyfill Hooks
        window.LOG_DEBUG('Injecting Proto-Polyfills');
        window.EventEmitter = window.EventEmitter || function () { };
        window.Stream = window.Stream || function () { };
        window.Buffer = window.Buffer || { isBuffer: () => false };

        window.addEventListener('error', (event) => {
            window.LOG_DEBUG('HYPER-CRITICAL ERROR CAPTURED', {
                message: event.message,
                filename: event.filename,
                lineno: event.lineno,
                colno: event.colno,
                stack: event.error ? event.error.stack : 'No stack trace available'
            });
            // Show a visual debug overlay if it's a blank screen
            const errorDiv = document.createElement('div');
            errorDiv.style = "position:fixed;top:0;left:0;width:100%;background:rgba(255,0,0,0.9);color:white;padding:20px;z-index:10000;font-family:monospace;overflow:auto;max-height:80vh;border-bottom:5px solid white;";
            errorDiv.innerHTML = `
                <h3>MedVault Crash Detected</h3>
                <p><b>Error:</b> ${event.message}</p>
                <p><b>Source:</b> ${event.filename}:${event.lineno}:${event.colno}</p>
                <div style="background:#000;padding:10px;margin-top:10px;overflow:auto;">
                    <pre>${event.error ? event.error.stack : 'No stack trace'}</pre>
                </div>
                <p style="margin-top:10px;font-size:12px;">Check console for full MEDVAULT-DEBUG logs.</p>
            `;
            document.body.appendChild(errorDiv);
        });

        window.addEventListener('unhandledrejection', (event) => {
            window.LOG_DEBUG('UNHANDLED PROMISE REJECTION', event.reason);
        });
    </script>
</head>

<body class="bg-gray-950 text-gray-100 antialiased font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
