specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: AnonymousPatientRegistry
    network: arbitrum-sepolia
    source:
      address: "0xE80d3100e7E20569d593dF41f5c3A2D68dEE8FAA"
      abi: AnonymousPatientRegistry
      startBlock: 264191794
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - AnonymousPatient
      abis:
        - name: AnonymousPatientRegistry
          file: ./abis/AnonymousPatientRegistry.json
      eventHandlers:
        - event: PatientRegistered(indexed uint256,uint256)
          handler: handleAnonymousPatientRegistered
        - event: DataAccessed(indexed uint256,indexed address,uint256)
          handler: handleDataAccessed
      file: ./src/mappings/anonymous-patient-registry.ts

  - kind: ethereum
    name: TrialManager
    network: arbitrum-sepolia
    source:
      address: "0x820AE8AC3D90E68bA259B5B10717C38F244C5C62"
      abi: TrialManager
      startBlock: 264191835
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - Trial
        - Sponsor
      abis:
        - name: TrialManager
          file: ./abis/TrialManager.json
      eventHandlers:
        - event: TrialCreated(indexed uint256,indexed address,string,uint256)
          handler: handleTrialCreated
        - event: TrialDeactivated(indexed uint256)
          handler: handleTrialDeactivated
        - event: SponsorNameUpdated(indexed address,string)
          handler: handleSponsorNameUpdated
      file: ./src/mappings/trial-manager.ts

  - kind: ethereum
    name: ConsentManager
    network: arbitrum-sepolia
    source:
      address: "0x18594910e76659E004575649d8BA97198696F8eC"
      abi: ConsentManager
      startBlock: 264191851
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - Consent
      abis:
        - name: ConsentManager
          file: ./abis/ConsentManager.json
      eventHandlers:
        - event: EncryptedConsentGranted(indexed address,indexed uint256,bytes32)
          handler: handleEncryptedConsentGranted
        - event: ConsentRevoked(indexed address,indexed uint256,bytes32)
          handler: handleConsentRevoked
      file: ./src/mappings/consent-manager.ts

  - kind: ethereum
    name: EligibilityEngine
    network: arbitrum-sepolia
    source:
      address: "0x083E595f873440a4458cC8603FAc877A097FeF07"
      abi: EligibilityEngine
      startBlock: 264191895
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - EligibilityResult
        - Application
        - AnonymousSubmission
      abis:
        - name: EligibilityEngine
          file: ./abis/EligibilityEngine.json
        - name: TrialManager
          file: ./abis/TrialManager.json
      eventHandlers:
        - event: EligibilityComputed(indexed address,indexed uint256)
          handler: handleEligibilityComputed
        - event: EligibilityScoreComputed(indexed address,indexed uint256)
          handler: handleEligibilityComputed
        - event: AppliedToTrial(indexed address,indexed uint256)
          handler: handleAppliedToTrial
        - event: ApplicationStatusUpdated(indexed address,indexed uint256,uint8,bytes)
          handler: handleApplicationStatusUpdated
        - event: AnonymousApplicationStatusUpdated(indexed uint256,indexed uint256,uint8)
          handler: handleAnonymousApplicationStatusUpdated
      file: ./src/mappings/eligibility-engine.ts

  - kind: ethereum
    name: SponsorIncentiveVault
    network: arbitrum-sepolia
    source:
      address: "0x32d8F1788C7928F2cA38bf985F6F686ed331C77A"
      abi: SponsorIncentiveVault
      startBlock: 264191993
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - IncentivePool
        - IncentiveParticipant
      abis:
        - name: SponsorIncentiveVault
          file: ./abis/SponsorIncentiveVault.json
      eventHandlers:
        - event: IncentiveFunded(indexed uint256,indexed address,uint256)
          handler: handleIncentiveFunded
        - event: ParticipantRegistered(indexed uint256,indexed address)
          handler: handleParticipantRegistered
        - event: RewardsDistributed(indexed uint256,uint256,uint256)
          handler: handleRewardsDistributed
        - event: MilestoneRewardsDistributed(indexed uint256,uint256,uint256)
          handler: handleMilestoneRewardsDistributed
      file: ./src/mappings/sponsor-incentive-vault.ts

  - kind: ethereum
    name: DataAccessLog
    network: arbitrum-sepolia
    source:
      address: "0x3741C83FB5B7554F9eDd2ac33b4695a371A40E2B"
      abi: DataAccessLog
      startBlock: 264191871
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - AuditLog
      abis:
        - name: DataAccessLog
          file: ./abis/DataAccessLog.json
      eventHandlers:
        - event: ActionLogged(indexed uint8,indexed uint256,indexed bytes32)
          handler: handleActionLogged
      file: ./src/mappings/data-access-log.ts

  - kind: ethereum
    name: TrialMilestoneManager
    network: arbitrum-sepolia
    source:
      address: "0x7F9bb2b0088f77D426E0eBe39d44Eaea5Bdb9B60"
      abi: TrialMilestoneManager
      startBlock: 264192010
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - TrialMilestone
        - ParticipantProgress
      abis:
        - name: TrialMilestoneManager
          file: ./abis/TrialMilestoneManager.json
      eventHandlers:
        - event: MilestonesSet(indexed uint256,uint256)
          handler: handleMilestonesSet
        - event: MilestoneCompleted(indexed uint256,indexed address,uint256)
          handler: handleMilestoneCompleted
      file: ./src/mappings/trial-milestone-manager.ts

  - kind: ethereum
    name: SponsorRegistry
    network: arbitrum-sepolia
    source:
      address: "0x75C1D333770E9728844dBe1Eab63D35824fd453B"
      abi: SponsorRegistry
      startBlock: 264191813
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - Sponsor
      abis:
        - name: SponsorRegistry
          file: ./abis/SponsorRegistry.json
      eventHandlers:
        - event: SponsorAdded(indexed address,string)
          handler: handleSponsorAdded
        - event: SponsorRemoved(indexed address)
          handler: handleSponsorRemoved
        - event: SponsorshipRequested(indexed address,bytes32)
          handler: handleSponsorshipRequested
        - event: SponsorshipRequestResolved(indexed address,uint8)
          handler: handleSponsorshipRequestResolved
      file: ./src/mappings/sponsor-registry.ts

  - kind: ethereum
    name: StakingManager
    network: arbitrum-sepolia
    source:
      address: "0xB23d7453Ec3451EbE50b7e27FB7730304A091769"
      abi: StakingManager
      startBlock: 264192041
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - StakingUser
      abis:
        - name: StakingManager
          file: ./abis/StakingManager.json
      eventHandlers:
        - event: Staked(indexed address,uint256)
          handler: handleStaked
        - event: Unstaked(indexed address,uint256)
          handler: handleUnstaked
      file: ./src/mappings/staking-manager.ts

  - kind: ethereum
    name: MedVaultRegistry
    network: arbitrum-sepolia
    source:
      address: "0x179C19006C6d6bc94C04e9090d71F3ccc466cA1A"
      abi: MedVaultRegistry
      startBlock: 264192054
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.8
      language: wasm/assemblyscript
      entities:
        - AnonymousPatient
        - AnonymousSubmission
        - Patient
      abis:
        - name: MedVaultRegistry
          file: ./abis/MedVaultRegistry.json
        - name: ISemaphore
          file: ./abis/ISemaphore.json
      eventHandlers:
        - event: PatientRegistered(indexed uint256)
          handler: handlePatientRegistered
        - event: AnonymousApplyStaged(indexed uint256,indexed uint256,indexed bytes32,bytes32)
          handler: handleAnonymousApplyStaged
        - event: AnonymousApplication(indexed uint256,indexed uint256,indexed bytes32)
          handler: handleAnonymousApplication
      file: ./src/mappings/medvault-registry.ts
